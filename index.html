<!-- PAINEL DE CADASTRAR NOVO FORNECEDOR DINÂMICO -->
            <div class="bg-slate-800 p-6 rounded-3xl border border-amber-500/40 shadow-xl space-y-4">
                <div class="border-b border-slate-700 pb-3 flex justify-between items-center">
                    <div>
                        <h3 class="text-base font-black text-amber-300 flex items-center gap-2">
                            <span>🏢</span> CADASTRAR NOVO FORNECEDOR / PARCEIRO
                        </h3>
                        <p class="text-xs text-slate-400">Adicione uma nova Razão Social na base. O sistema atualizará automaticamente os menus do PCP, de Usuários e do Portal.</p>
                    </div>
                    <span id="badgeQtdFornecedoresTotal" class="bg-amber-500 text-slate-950 font-black text-xs px-3 py-1 rounded-full">0 Empresas</span>
                </div>

                <form onsubmit="salvarNovoFornecedorDinamico(event)" class="grid grid-cols-1 md:grid-cols-12 gap-3 bg-slate-900/80 p-4 rounded-2xl border border-slate-700/80">
                    <div class="md:col-span-6">
                        <label class="block text-[10px] font-bold text-slate-300 uppercase mb-1">Razão Social / Nome da Empresa *</label>
                        <input type="text" id="cadFornNome" placeholder="Ex: NOVA LOGÍSTICA S/A" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white font-bold uppercase outline-none focus:border-amber-500">
                    </div>
                    <div class="md:col-span-4">
                        <label class="block text-[10px] font-bold text-slate-300 uppercase mb-1">Senha de Acesso Exclusiva (Opcional)</label>
                        <input type="text" id="cadFornSenha" placeholder="Ex: novalogistica@2026 (Padrão se vazio)" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-yellow-300 font-mono outline-none focus:border-amber-500">
                    </div>
                    <div class="md:col-span-2 flex items-end">
                        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-2.5 rounded-xl text-xs uppercase shadow transition cursor-pointer">
                            ➕ Cadastrar
                        </button>
                    </div>
                </form>
            </div>
